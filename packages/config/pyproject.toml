[project]
name = "aiconfig-config"
version = "0.1.0"
description = "MCP and client configuration management for aiconfig"
requires-python = ">=3.11"
dependencies = [
    "pyyaml>=6.0",
]

[project.scripts]
aiconfig-mcp = "aiconfig_config.cli:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"
